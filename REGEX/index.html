<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="form-box">
    <h1>Register</h1>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="5–15 alphanumeric characters">
      <span id="username-msg" class="msg"></span>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 chars, uppercase, digit, special">
      <span id="password-msg" class="msg"></span>
    </div>

    <div class="field">
      <label>Phone Number</label>
      <input type="text" id="phone" placeholder="+2348012345678">
      <span id="phone-msg" class="msg"></span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
