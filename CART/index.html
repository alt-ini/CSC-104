<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Textbook Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Textbook Shop</h1>

  <div class="container">

    <!-- Products go here, filled in by script.js -->
    <div id="product-list"></div>

    <!-- Cart goes here -->
    <div id="cart">
      <h2>Cart</h2>
      <ul id="cart-items"></ul>
      <p>Total: <span id="total">₦0</span></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
